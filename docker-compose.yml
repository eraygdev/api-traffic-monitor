services:
  db:
    image: postgres:16
    container_name: api_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
      
  redis:
    image: redis:alpine
    container_name: api_redis
    ports:
      - "6379:6379"